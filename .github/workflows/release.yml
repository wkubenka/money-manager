name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false

  build-mac:
    needs: create-release
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: fileinfo, zip

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist
          npm ci

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          echo "NATIVEPHP_APP_VERSION=${GITHUB_REF_NAME#v}" >> .env
          echo "NATIVEPHP_UPDATER_ENABLED=true" >> .env
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> .env

      - name: Build frontend assets
        run: npm run build

      - name: Build and publish native app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NATIVEPHP_UPDATER_ENABLED: 'true'
        run: php artisan native:build mac --publish --no-interaction

  build-windows:
    needs: create-release
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: fileinfo, zip

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist
          npm ci

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          echo "NATIVEPHP_APP_VERSION=${GITHUB_REF_NAME#v}" >> .env
          echo "NATIVEPHP_UPDATER_ENABLED=true" >> .env
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> .env

      - name: Build frontend assets
        run: npm run build

      - name: Build and publish native app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NATIVEPHP_UPDATER_ENABLED: 'true'
        run: php artisan native:build win --publish --no-interaction
