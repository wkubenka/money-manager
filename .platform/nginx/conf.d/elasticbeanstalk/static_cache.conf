location /build/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

location /sw.js {
    expires off;
    add_header Cache-Control "no-cache";
}

location /manifest.json {
    expires 1d;
    add_header Cache-Control "public";
    access_log off;
}

location ~* ^/(favicon\.(ico|svg)|apple-touch-icon\.png|icon-\d+x\d+\.png)$ {
    expires 30d;
    add_header Cache-Control "public";
    access_log off;
}
